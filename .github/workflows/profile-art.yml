name: Update profile artwork (Pac-Man + Snake)

on:
  schedule:
    - cron: "0 0 * * *"    
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- SNAKE ---
      - name: Generate Snake SVGs (light + dark)
        uses: Platane/snk@v3
        with:
          github_user_name: Nubet
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      # --- PAC-MAN ---
      # generujemy do osobnego katalogu, żeby uniknąć konfliktu
      - name: Prepare separate directory for Pac-Man
        run: mkdir -p dist-pacman

      - name: Generate Pac-Man SVGs
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: Nubet
      - name: Move Pac-Man output to dist-pacman
        run: |
          mkdir -p dist-pacman
          if [ -d "dist" ]; then cp -r dist/* dist-pacman/ || true; fi

      # --- MERGE  ---
      - name: Merge all generated SVGs
        run: |
          mkdir -p dist-final
          cp -r dist/* dist-final/ 2>/dev/null || true
          cp -r dist-pacman/* dist-final/ 2>/dev/null || true
          ls -la dist-final

      # --- PUBLISH ---
      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist-final
          commit_message: "chore: update Pac-Man + Snake"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
