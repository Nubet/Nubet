name: Update profile artwork (Pac-Man + Snake)

on:
  schedule:
    - cron: "0 0 * * *"   # codziennie 00:00 UTC
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- SNAKE ---
      - name: Generate Snake SVG (light)
        uses: Platane/snk/svg@v3
        with:
          github_user_name: Nubet
          outputs: dist/github-snake.svg
      - name: Generate Snake SVG (dark)
        uses: Platane/snk/svg@v3
        with:
          github_user_name: Nubet
          outputs: dist/github-snake-dark.svg

      # --- PAC-MAN ---
      - name: Generate Pac-Man SVGs
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      # --- PUBLISH:t ---
      - name: Publish to output
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          commit_message: "chore: update Pac-Man + Snake"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
